<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Token — 3D Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div id="lobby" class="panel">
        <div class="panel-inner">
          <p class="eyebrow">Even in Arcadia, there exis—</p>
          <h1>Sleep Token</h1>
          <h2>3D Chess · Multiplayer</h2>
          <p class="subtitle">Summon an opponent across the void. Host a chamber or enter a ritual code.</p>

          <div class="mode-tabs">
            <button type="button" class="tab active" data-tab="multi">Multiplayer</button>
            <button type="button" class="tab" data-tab="solo">Solo</button>
          </div>

          <div id="tab-multi" class="tab-panel active">
            <div class="actions">
              <button type="button" id="btn-host" class="btn primary">Create Game</button>
              <div class="join-row">
                <input id="join-code" type="text" placeholder="RITUAL CODE" maxlength="8" autocomplete="off" />
                <button type="button" id="btn-join" class="btn">Join</button>
              </div>
            </div>
            <p id="lobby-status" class="status">Choose your path.</p>
            <div id="room-display" class="room-display hidden">
              <span class="label">Ritual Code</span>
              <code id="room-code"></code>
              <button type="button" id="btn-copy" class="btn ghost">Copy</button>
            </div>
          </div>

          <div id="tab-solo" class="tab-panel">
            <button type="button" id="btn-solo" class="btn primary full">Play Solo</button>
            <p class="hint">Local hot-seat — both sides on one device.</p>
          </div>
        </div>
      </div>

      <div id="hud" class="hud hidden">
        <div class="hud-left">
          <span class="brand">Sleep Token Chess</span>
          <span id="hud-mode" class="pill"></span>
        </div>
        <div class="hud-center">
          <span id="turn-label" class="turn"></span>
          <span id="status-label" class="status-line"></span>
        </div>
        <div class="hud-right">
          <button type="button" id="btn-flip" class="btn ghost small">Flip Board</button>
          <button type="button" id="btn-leave" class="btn ghost small">Leave</button>
        </div>
      </div>

      <div id="promotion-modal" class="modal hidden">
        <div class="modal-inner">
          <p>Choose your ascension</p>
          <div class="promo-picks">
            <button type="button" data-piece="q">Queen</button>
            <button type="button" data-piece="r">Rook</button>
            <button type="button" data-piece="b">Bishop</button>
            <button type="button" data-piece="n">Knight</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
